server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect root to /TailAdmin/
    location = / {
        return 301 /TailAdmin/;
    }

    # Serve app — fallback to index.html for React Router
    location /TailAdmin/ {
        try_files $uri $uri/ /TailAdmin/index.html;
    }
}
